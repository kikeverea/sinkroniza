version: "3.9"

services:
  db:
    image: mysql:5.7
    container_name: rails_new_base_db
    environment:
      MYSQL_ROOT_PASSWORD: newB4s32025
      MYSQL_DATABASE: app_dev
      MYSQL_USER: app
      MYSQL_PASSWORD: newB4s32025
    ports:
      - "4010:3306"
    volumes:
      - db_data:/var/lib/mysql

  pma:
    image: phpmyadmin/phpmyadmin:latest
    container_name: rails_new_base_pma
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: newB4s32025
      UPLOAD_LIMIT: 100M
    ports:
      - "4011:80"
    depends_on:
      - db

  web:
    build: .
    container_name: rails_new_base
    working_dir: /app
    command: bash -c "bundle install && bin/rails server -b 0.0.0.0 -p 3000"
    volumes:
      - .:/app
      - rails_new_base_uploads:/app/public/uploads
    ports:
      - "4012:3000"
    depends_on:
      - db

volumes:
  db_data:
  rails_new_base_uploads:
